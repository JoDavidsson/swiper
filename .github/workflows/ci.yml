name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  flutter:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.24.0"
          channel: stable
      - name: Install dependencies
        run: cd apps/Swiper_flutter && flutter pub get
      - name: Analyze
        run: cd apps/Swiper_flutter && flutter analyze --no-fatal-infos
      - name: Test
        run: cd apps/Swiper_flutter && flutter test
      - name: Build web
        run: cd apps/Swiper_flutter && flutter build web --no-tree-shake-icons

  functions:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"
          cache-dependency-path: firebase/functions/package-lock.json
      - name: Install dependencies
        run: cd firebase/functions && npm ci
      - name: Build
        run: cd firebase/functions && npm run build
      - name: Test
        run: cd firebase/functions && npm run test

  supply_engine:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          cd services/supply_engine
          pip install -r requirements.txt
          pip install pytest
      - name: Test
        run: |
          cd services/supply_engine
          PYTHONPATH=. pytest tests/ -v
